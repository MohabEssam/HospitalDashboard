<script>
const departments = [
  { id:'cardiology',       name:'Cardiology',         img:'../assets/images/Department/card.png' },
  { id:'dentistry',        name:'Dentistry',          img:'../assets/images/Department/dent.png' },
  { id:'ent',              name:'ENT',                img:'../assets/images/Department/ent.png' },
  { id:'general-surgery',  name:'General Surgery',    img:'../assets/images/Department/rang.png' },
  { id:'neurosurgery',     name:'Neurosurgery',       img:'../assets/images/Department/neurosurgery-home-icon.png' },
  { id:'obs-gyn',          name:'Obs & Gyn',          img:'../assets/images/Department/ops-and-gyn-home-icon.png' },
  { id:'oncology',         name:'Oncology',           img:'../assets/images/Department/oncology-homepage-icon.png' },
  { id:'orthopedic',       name:'Orthopedic',         img:'../assets/images/Department/Orthopedic.png' },
  { id:'pediatric',        name:'Pediatric',          img:'../assets/images/Department/ped.png' },
  { id:'git',              name:'GIT',                img:'../assets/images/Department/GIT-300x300.png' },
  { id:'internal-medicine',name:'Internal Medicine',  img:'../assets/images/Department/medicine-236x300.png' },
  { id:'vascular',         name:'Vascular Surgery',   img:'../assets/images/Department/vascular-236x300.png' },
  { id:'plastic-surgery',  name:'Plastic Surgery',    img:'../assets/images/Department/plastic-surgery-homepage-icon.png' },
  { id:'radiodiagnosis',   name:'Radiodiagnosis',     img:'../assets/images/Department/Radiodiagnosis-icon-home.png' },
  { id:'cardiothoracic',   name:'Cardiothoracic',     img:'../assets/images/Department/cardio-e1649375075487-150x150.png' },
];

const total = departments.length;
document.getElementById('deptGrid').innerHTML = departments.map((d, i) => {
  // border-right on all except last in each row (3 per row on md+)
  const isLastInRow = (i + 1) % 3 === 0;
  const isLastRow   = i >= total - (total % 3 || 3);
  const borderR = isLastInRow ? '' : 'border-end';
  const borderB = isLastRow   ? '' : 'border-bottom';
  return `
  <div class="col-4 col-md-4 dept-cell ${borderR} ${borderB}">
    <a href="DepartmentDetails.html?dept=${d.id}">
      <img src="${d.img}" alt="${d.name}">
      <p>${d.name}</p>
    </a>
  </div>`;
}).join('');
</script>
